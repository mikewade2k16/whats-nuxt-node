# Override de produção. Usar junto com o docker-compose.yml base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile channels --env-file .env.prod up -d
#
# Este arquivo:
#   - adiciona Caddy (HTTPS automático + reverse proxy)
#   - corrige SERVER_URL da Evolution para URL pública
#   - remove exposição de portas que não devem ser públicas
#   - força `painel-web` e `atendimento-online` a subir em modo produtivo, sem watch/HMR
#   - remove bootstrap automático de schema do caminho de restart da produção

name: omnichannel-mvp

services:

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ADMINER_USER: ${ADMINER_USER:-dbadmin}
      ADMINER_PASSWORD_HASH: ${ADMINER_PASSWORD_HASH:-$$2a$$14$$YWnevtAHvtC3U0y8lDKvJ.OK9Xoy46MQ1wNww.0PJP8Tb.iQElBkS}
    depends_on:
      - atendimento-online-api
      - painel-web
    restart: unless-stopped

  adminer:
    profiles: ["ops"]
    ports: !reset []

  redis-commander:
    profiles: ["ops"]
    ports: !reset []

  atendimento-online-api:
    image: omnichannel-mvp-atendimento-online-api:prod
    build:
      context: ./apps/atendimento-online-api
      dockerfile: Dockerfile.prod
      target: prod
    command: null
    environment:
      NODE_ENV: production
    volumes: !reset []
    ports: !reset []

  atendimento-online-worker:
    image: omnichannel-mvp-atendimento-online-worker:prod
    build:
      context: ./apps/atendimento-online-api
      dockerfile: Dockerfile.prod
      target: worker
    command: null
    environment:
      NODE_ENV: production
    volumes: !reset []

  atendimento-online-retencao-worker:
    image: omnichannel-mvp-atendimento-online-retencao-worker:prod
    build:
      context: ./apps/atendimento-online-api
      dockerfile: Dockerfile.prod
      target: retention
    command: null
    environment:
      NODE_ENV: production
    volumes: !reset []

  plataforma-api:
    ports: !reset []
    environment:
      CORE_PASSWORD_RESET_TTL_MINUTES: ${CORE_PASSWORD_RESET_TTL_MINUTES:-15}
      CORE_SMTP_HOST: ${CORE_SMTP_HOST:-}
      CORE_SMTP_PORT: ${CORE_SMTP_PORT:-0}
      CORE_SMTP_USERNAME: ${CORE_SMTP_USERNAME:-}
      CORE_SMTP_PASSWORD: ${CORE_SMTP_PASSWORD:-}
      CORE_SMTP_FROM_EMAIL: ${CORE_SMTP_FROM_EMAIL:-}
      CORE_SMTP_FROM_NAME: ${CORE_SMTP_FROM_NAME:-Plataforma}
      FILA_ATENDIMENTO_WEB_APP_URL: ${FILA_ATENDIMENTO_WEB_APP_URL:-https://app.${DOMAIN}}
      FILA_ATENDIMENTO_CORS_ALLOWED_ORIGINS: ${FILA_ATENDIMENTO_CORS_ALLOWED_ORIGINS:-https://app.${DOMAIN}}
      FILA_ATENDIMENTO_SHELL_BRIDGE_SECRET: ${FILA_ATENDIMENTO_SHELL_BRIDGE_SECRET:-fila-atendimento-shell-bridge-dev}
      FILA_ATENDIMENTO_AUTH_SHELL_BRIDGE_TENANT_SLUG: ${FILA_ATENDIMENTO_AUTH_SHELL_BRIDGE_TENANT_SLUG:-tenant-demo}

  mailpit:
    profiles: ["local-mail"]
    ports: !reset []

  painel-web:
    image: omnichannel-mvp-painel-web:prod
    build:
      context: .
      dockerfile: apps/painel-web/Dockerfile.prod
    command: null
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_FILA_ATENDIMENTO_BASE: ${NUXT_PUBLIC_FILA_ATENDIMENTO_BASE:-https://app.${DOMAIN}}
      NUXT_PUBLIC_FILA_ATENDIMENTO_API_BASE: ${NUXT_PUBLIC_FILA_ATENDIMENTO_API_BASE:-https://app.${DOMAIN}/api/admin/modules/fila-atendimento}
      NUXT_FILA_ATENDIMENTO_SHELL_BRIDGE_SECRET: ${FILA_ATENDIMENTO_SHELL_BRIDGE_SECRET:-fila-atendimento-shell-bridge-dev}
    volumes: !reset []
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports: !reset []

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  whatsapp-evolution-gateway:
    ports: !reset []
    environment:
      SERVER_URL: https://evo.${DOMAIN}

volumes:
  caddy_data:
  caddy_config:
