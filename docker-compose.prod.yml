# Override de producao — usar junto com o docker-compose.yml base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile channels --env-file .env.prod up -d
#
# Este arquivo:
#   - Adiciona Caddy (HTTPS automatico + reverse proxy)
#   - Corrige SERVER_URL da Evolution para URL publica
#   - Remove exposicao de portas que nao devem ser publicas
#   - Os servicos api/web/worker rodam em dev mode com codigo montado via volume
#     (adequado para teste; para producao real usar Dockerfile.prod standalone)

name: omnichannel-mvp

services:

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ADMINER_USER: ${ADMINER_USER:-dbadmin}
      ADMINER_PASSWORD_HASH: ${ADMINER_PASSWORD_HASH}
    depends_on:
      - api
      - web
    restart: unless-stopped

  adminer:
    image: adminer:4.8.1
    profiles: ["channels"]
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    ports: []

  web:
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install --no-audit --no-fund; fi;
      npm run build &&
      node .output/server/index.mjs"
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    ports: []

  postgres:
    ports: []

  redis:
    ports: []

  evolution:
    ports: []
    environment:
      SERVER_URL: https://evo.${DOMAIN}

volumes:
  caddy_data:
  caddy_config:
