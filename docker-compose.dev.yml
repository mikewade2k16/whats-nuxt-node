name: omnichannel-mvp

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Lightweight tuning for local DEV.
      POSTGRES_INITDB_ARGS: >
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - "everysec"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-noeviction}
      - --tcp-keepalive
      - "300"
      - --timeout
      - "300"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  adminer:
    image: adminer:4.8.1
    profiles: ["ops"]
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 96M

  redis-commander:
    image: rediscommander/redis-commander:latest
    profiles: ["ops"]
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8089:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 96M

  mailpit:
    image: axllent/mailpit:v1.20
    environment:
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_UI_BIND_ADDR: 0.0.0.0:8025
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 96M

  atendimento-online-api:
    build:
      context: ./apps/atendimento-online-api
      dockerfile: Dockerfile
      target: dev
    command: >
      sh -c "npm run prisma:generate &&
      npm run prisma:push &&
      if [ \"${API_DB_SEED_ON_BOOT:-true}\" = \"true\" ]; then npm run prisma:seed; fi &&
      npm run dev"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PORT: ${PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TRUSTED_PROXY_RANGES: ${TRUSTED_PROXY_RANGES:-loopback,private}
      CORE_API_BASE_URL: ${CORE_API_BASE_URL:-http://plataforma-api:4100}
      CORE_API_EMAIL: ${CORE_API_EMAIL:-root@core.local}
      CORE_API_PASSWORD: ${CORE_API_PASSWORD:-123456}
      CORE_REQUEST_TIMEOUT_MS: ${CORE_REQUEST_TIMEOUT_MS:-15000}
      CORE_ATENDIMENTO_MODULE_CODE: ${CORE_ATENDIMENTO_MODULE_CODE:-atendimento}
      EVOLUTION_BASE_URL: ${EVOLUTION_BASE_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_SEND_PATH: ${EVOLUTION_SEND_PATH}
      EVOLUTION_SEND_MEDIA_PATH: ${EVOLUTION_SEND_MEDIA_PATH}
      EVOLUTION_SEND_AUDIO_PATH: ${EVOLUTION_SEND_AUDIO_PATH}
      EVOLUTION_SEND_STICKER_PATH: ${EVOLUTION_SEND_STICKER_PATH:-/message/sendSticker/:instance}
      EVOLUTION_SEND_REACTION_PATH: ${EVOLUTION_SEND_REACTION_PATH:-/message/sendReaction/:instance}
      EVOLUTION_DEFAULT_INSTANCE: ${EVOLUTION_DEFAULT_INSTANCE}
      EVOLUTION_WEBHOOK_TOKEN: ${EVOLUTION_WEBHOOK_TOKEN}
      WEBHOOK_IDEMPOTENCY_TTL_SECONDS: ${WEBHOOK_IDEMPOTENCY_TTL_SECONDS:-21600}
      WEBHOOK_IDEMPOTENCY_PROCESSING_TTL_SECONDS: ${WEBHOOK_IDEMPOTENCY_PROCESSING_TTL_SECONDS:-120}
      WEBHOOK_RECEIVER_BASE_URL: ${WEBHOOK_RECEIVER_BASE_URL}
      RETENTION_SWEEP_ON_BOOT: ${RETENTION_SWEEP_ON_BOOT:-false}
      RETENTION_SWEEP_INTERVAL_MINUTES: ${RETENTION_SWEEP_INTERVAL_MINUTES:-1440}
      NODE_ENV: development
      NODE_OPTIONS: --max-old-space-size=512
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/atendimento-online-api:/app
      - atendimento_online_api_node_modules:/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1.5G
        reservations:
          cpus: "1"
          memory: 768M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:4000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  plataforma-api:
    build:
      context: .
      dockerfile: apps/plataforma-api/Dockerfile
    environment:
      CORE_DATABASE_URL: ${CORE_DATABASE_URL:-postgresql://omnichannel:omnichannel@postgres:5432/omnichannel}
      CORE_DB_SCHEMA: ${CORE_DB_SCHEMA:-platform_core}
      CORE_REDIS_URL: ${CORE_REDIS_URL:-redis://redis:6379}
      CORE_HTTP_ADDR: ${CORE_HTTP_ADDR:-:4100}
      CORE_JWT_SECRET: ${CORE_JWT_SECRET:-change-this-core-secret}
      CORE_JWT_ISSUER: ${CORE_JWT_ISSUER:-plataforma-api}
      CORE_JWT_TTL_MINUTES: ${CORE_JWT_TTL_MINUTES:-60}
      CORE_PASSWORD_RESET_TTL_MINUTES: ${CORE_PASSWORD_RESET_TTL_MINUTES:-15}
      CORE_DEFAULT_USERS_LIMIT: ${CORE_DEFAULT_USERS_LIMIT:-10}
      CORE_ALLOWED_ORIGINS: ${CORE_ALLOWED_ORIGINS:-http://localhost:3000}
      CORE_TRUSTED_PROXY_RANGES: ${CORE_TRUSTED_PROXY_RANGES:-loopback,private}
      CORE_AUTO_MIGRATE: ${CORE_AUTO_MIGRATE:-true}
      CORE_SMTP_HOST: ${CORE_SMTP_HOST:-mailpit}
      CORE_SMTP_PORT: ${CORE_SMTP_PORT:-1025}
      CORE_SMTP_USERNAME: ${CORE_SMTP_USERNAME:-}
      CORE_SMTP_PASSWORD: ${CORE_SMTP_PASSWORD:-}
      CORE_SMTP_FROM_EMAIL: ${CORE_SMTP_FROM_EMAIL:-no-reply@core.local}
      CORE_SMTP_FROM_NAME: ${CORE_SMTP_FROM_NAME:-Plataforma}
      FILA_ATENDIMENTO_ENABLED: ${FILA_ATENDIMENTO_ENABLED:-true}
      FILA_ATENDIMENTO_DATABASE_URL: ${FILA_ATENDIMENTO_DATABASE_URL:-postgresql://omnichannel:omnichannel@postgres:5432/omnichannel}
      FILA_ATENDIMENTO_DB_SCHEMA: ${FILA_ATENDIMENTO_DB_SCHEMA:-fila_atendimento}
      FILA_ATENDIMENTO_WEB_APP_URL: ${FILA_ATENDIMENTO_WEB_APP_URL:-http://localhost:3000}
      FILA_ATENDIMENTO_UPLOADS_DIR: ${FILA_ATENDIMENTO_UPLOADS_DIR:-/app/data/fila-atendimento/uploads}
      FILA_ATENDIMENTO_DATABASE_MIN_CONNS: ${FILA_ATENDIMENTO_DATABASE_MIN_CONNS:-0}
      FILA_ATENDIMENTO_DATABASE_MAX_CONNS: ${FILA_ATENDIMENTO_DATABASE_MAX_CONNS:-10}
      FILA_ATENDIMENTO_CORS_ALLOWED_ORIGINS: ${FILA_ATENDIMENTO_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      FILA_ATENDIMENTO_AUTH_TOKEN_SECRET: ${FILA_ATENDIMENTO_AUTH_TOKEN_SECRET:-change-this-fila-secret}
      FILA_ATENDIMENTO_AUTH_TOKEN_TTL: ${FILA_ATENDIMENTO_AUTH_TOKEN_TTL:-12h}
      FILA_ATENDIMENTO_AUTH_INVITE_TTL: ${FILA_ATENDIMENTO_AUTH_INVITE_TTL:-168h}
      FILA_ATENDIMENTO_SHELL_BRIDGE_SECRET: ${FILA_ATENDIMENTO_SHELL_BRIDGE_SECRET:-fila-atendimento-shell-bridge-dev}
      FILA_ATENDIMENTO_AUTH_SHELL_BRIDGE_TENANT_SLUG: ${FILA_ATENDIMENTO_AUTH_SHELL_BRIDGE_TENANT_SLUG:-tenant-demo}
      FILA_ATENDIMENTO_AUTH_BCRYPT_COST: ${FILA_ATENDIMENTO_AUTH_BCRYPT_COST:-10}
      FILA_ATENDIMENTO_AUTH_CONSULTANT_EMAIL_DOMAIN: ${FILA_ATENDIMENTO_AUTH_CONSULTANT_EMAIL_DOMAIN:-acesso.omni.local}
      FILA_ATENDIMENTO_AUTH_CONSULTANT_DEFAULT_PASSWORD: ${FILA_ATENDIMENTO_AUTH_CONSULTANT_DEFAULT_PASSWORD:-Omni@123}
    ports:
      - "4100:4100"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - fila_atendimento_uploads:/app/data/fila-atendimento/uploads
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  atendimento-online-worker:
    build:
      context: ./apps/atendimento-online-api
      dockerfile: Dockerfile
      target: dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      EVOLUTION_BASE_URL: ${EVOLUTION_BASE_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_SEND_PATH: ${EVOLUTION_SEND_PATH}
      EVOLUTION_SEND_MEDIA_PATH: ${EVOLUTION_SEND_MEDIA_PATH}
      EVOLUTION_SEND_AUDIO_PATH: ${EVOLUTION_SEND_AUDIO_PATH}
      EVOLUTION_SEND_STICKER_PATH: ${EVOLUTION_SEND_STICKER_PATH:-/message/sendSticker/:instance}
      EVOLUTION_SEND_REACTION_PATH: ${EVOLUTION_SEND_REACTION_PATH:-/message/sendReaction/:instance}
      EVOLUTION_DEFAULT_INSTANCE: ${EVOLUTION_DEFAULT_INSTANCE}
      RETENTION_SWEEP_ON_BOOT: ${RETENTION_SWEEP_ON_BOOT:-false}
      NODE_ENV: development
      NODE_OPTIONS: --max-old-space-size=512
    command: npm run worker:dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      atendimento-online-api:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 15s
    volumes:
      - ./apps/atendimento-online-api:/app
      - atendimento_online_worker_node_modules:/app/node_modules
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 384M
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  atendimento-online-retencao-worker:
    build:
      context: ./apps/atendimento-online-api
      dockerfile: Dockerfile
      target: dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RETENTION_SWEEP_ON_BOOT: ${RETENTION_SWEEP_ON_BOOT:-false}
      RETENTION_SWEEP_INTERVAL_MINUTES: ${RETENTION_SWEEP_INTERVAL_MINUTES:-1440}
      NODE_ENV: development
      NODE_OPTIONS: --max-old-space-size=256
    command: npm run worker:retention:dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      atendimento-online-api:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 15s
    volumes:
      - ./apps/atendimento-online-api:/app
      - atendimento_online_retencao_worker_node_modules:/app/node_modules
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  painel-web:
    build:
      context: ./apps/painel-web
      dockerfile: Dockerfile
    command: >
      sh -c "mkdir -p .nuxt .output .nitro;
      rm -rf .nuxt/* .nuxt/.[!.]* .nuxt/..?* .output/* .output/.[!.]* .output/..?* .nitro/* .nitro/.[!.]* .nitro/..?* 2>/dev/null || true;
      npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_API_INTERNAL_BASE: ${NUXT_API_INTERNAL_BASE}
      NUXT_CORE_API_INTERNAL_BASE: ${NUXT_CORE_API_INTERNAL_BASE:-http://plataforma-api:4100}
      NUXT_PUBLIC_FILA_ATENDIMENTO_BASE: ${NUXT_PUBLIC_FILA_ATENDIMENTO_BASE:-http://localhost:3000}
      NUXT_PUBLIC_FILA_ATENDIMENTO_API_BASE: ${NUXT_PUBLIC_FILA_ATENDIMENTO_API_BASE:-http://localhost:3000/api/admin/modules/fila-atendimento}
      NUXT_FILA_ATENDIMENTO_API_INTERNAL_BASE: ${NUXT_FILA_ATENDIMENTO_API_INTERNAL_BASE:-http://plataforma-api:4100/core/modules/fila-atendimento}
      NUXT_FILA_ATENDIMENTO_WEB_INTERNAL_BASE: ${NUXT_FILA_ATENDIMENTO_WEB_INTERNAL_BASE:-http://painel-web:3000}
      NUXT_FILA_ATENDIMENTO_SHELL_BRIDGE_SECRET: ${FILA_ATENDIMENTO_SHELL_BRIDGE_SECRET:-fila-atendimento-shell-bridge-dev}
      NUXT_REDIS_URL: ${NUXT_REDIS_URL:-redis://redis:6379}
      NUXT_TRUSTED_PROXY_RANGES: ${NUXT_TRUSTED_PROXY_RANGES:-loopback,private}
      NUXT_GIF_PROVIDER: ${NUXT_GIF_PROVIDER:-tenor}
      NUXT_TENOR_API_KEY: ${NUXT_TENOR_API_KEY:-}
      NUXT_TENOR_BASE_URL: ${NUXT_TENOR_BASE_URL:-https://tenor.googleapis.com/v2}
      PROJECT_DOCS_DIR: /project-docs
      NODE_ENV: development
      NODE_OPTIONS: --max-old-space-size=768
    ports:
      - "3000:3000"
    depends_on:
      - atendimento-online-api
      - plataforma-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/painel-web:/app
      - ./docs:/project-docs:ro
      - painel_web_node_modules:/app/node_modules
      - painel_web_nuxt:/app/.nuxt
      - painel_web_output:/app/.output
      - painel_web_nitro:/app/.nitro
    restart: unless-stopped
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  whatsapp-evolution-gateway:
    image: ${EVOLUTION_IMAGE:-evoapicloud/evolution-api:v2.3.7}
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      CONFIG_SESSION_PHONE_VERSION: ${EVOLUTION_CONFIG_SESSION_PHONE_VERSION:-2,3000,1025205472}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URL}
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: ${REDIS_URL}
      WEBSOCKET_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - whatsapp_evolution_instances:/evolution/instances
    restart: unless-stopped
    stop_grace_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.25"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 384M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 25s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  atendimento_online_api_node_modules:
    driver: local
  atendimento_online_worker_node_modules:
    driver: local
  atendimento_online_retencao_worker_node_modules:
    driver: local
  painel_web_node_modules:
    driver: local
  painel_web_nuxt:
    driver: local
  painel_web_output:
    driver: local
  painel_web_nitro:
    driver: local
  fila_atendimento_uploads:
    driver: local
  whatsapp_evolution_instances:
    driver: local

networks:
  default:
    name: omnichannel-network
    driver: bridge
