name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/atendimento-online-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/atendimento-online-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Build API
        run: npm run build

  web-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/painel-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/painel-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

  security-access-audit:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: omnichannel
      POSTGRES_USER: omnichannel
      POSTGRES_PASSWORD: omnichannel
      DATABASE_URL: postgresql://omnichannel:omnichannel@postgres:5432/omnichannel?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-this-secret
      CORE_API_BASE_URL: http://plataforma-api:4100
      CORE_API_EMAIL: root@core.local
      CORE_API_PASSWORD: 123456
      CORE_REQUEST_TIMEOUT_MS: 15000
      CORE_ATENDIMENTO_MODULE_CODE: atendimento
      CORE_DATABASE_URL: postgresql://omnichannel:omnichannel@postgres:5432/omnichannel
      CORE_DB_SCHEMA: platform_core
      CORE_HTTP_ADDR: :4100
      CORE_JWT_SECRET: change-this-core-secret
      CORE_JWT_ISSUER: plataforma-api
      CORE_JWT_TTL_MINUTES: 60
      CORE_DEFAULT_USERS_LIMIT: 10
      CORE_ALLOWED_ORIGINS: http://localhost:3000
      CORE_AUTO_MIGRATE: "true"
      NUXT_PUBLIC_API_BASE: http://localhost:4000
      NUXT_API_INTERNAL_BASE: http://localhost:4000
      NUXT_CORE_API_INTERNAL_BASE: http://localhost:4100
      WEBHOOK_RECEIVER_BASE_URL: http://atendimento-online-api:4000
      EVOLUTION_WEBHOOK_TOKEN: change-this-webhook-token
      API_DB_SEED_ON_BOOT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/painel-web/package-lock.json

      - name: Install painel-web dependencies
        working-directory: apps/painel-web
        run: npm ci

      - name: Build painel-web
        working-directory: apps/painel-web
        run: npm run build

      - name: Start backend stack
        run: docker compose -f docker-compose.dev.yml up -d --build postgres redis plataforma-api atendimento-online-api

      - name: Wait for backend health
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:4100/health > /dev/null && \
               curl -fsS http://localhost:4000/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.dev.yml ps
          docker compose -f docker-compose.dev.yml logs --tail=200 plataforma-api atendimento-online-api postgres redis
          exit 1

      - name: Start painel-web
        run: |
          nohup env \
            NODE_ENV=production \
            PORT=3000 \
            NITRO_HOST=0.0.0.0 \
            NITRO_PORT=3000 \
            NUXT_PUBLIC_API_BASE=http://localhost:4000 \
            NUXT_API_INTERNAL_BASE=http://localhost:4000 \
            NUXT_CORE_API_INTERNAL_BASE=http://localhost:4100 \
            node apps/painel-web/.output/server/index.mjs > /tmp/painel-web.log 2>&1 &
          echo $! > /tmp/painel-web.pid

      - name: Wait for painel-web health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/admin/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/painel-web.log || true
          exit 1

      - name: Run security access audit
        run: node scripts/security-access-audit.mjs

      - name: Show stack logs on failure
        if: failure()
        run: |
          cat /tmp/painel-web.log || true
          docker compose -f docker-compose.dev.yml logs --tail=200 plataforma-api atendimento-online-api postgres redis

      - name: Stop painel-web
        if: always()
        run: |
          if [ -f /tmp/painel-web.pid ]; then
            kill "$(cat /tmp/painel-web.pid)" || true
          fi

      - name: Shutdown stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down --remove-orphans -v

  tenant-isolation-audit:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: omnichannel
      POSTGRES_USER: omnichannel
      POSTGRES_PASSWORD: omnichannel
      DATABASE_URL: postgresql://omnichannel:omnichannel@postgres:5432/omnichannel?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-this-secret
      CORE_API_BASE_URL: http://plataforma-api:4100
      CORE_API_EMAIL: root@core.local
      CORE_API_PASSWORD: 123456
      CORE_REQUEST_TIMEOUT_MS: 15000
      CORE_ATENDIMENTO_MODULE_CODE: atendimento
      CORE_DATABASE_URL: postgresql://omnichannel:omnichannel@postgres:5432/omnichannel
      CORE_DB_SCHEMA: platform_core
      CORE_HTTP_ADDR: :4100
      CORE_JWT_SECRET: change-this-core-secret
      CORE_JWT_ISSUER: plataforma-api
      CORE_JWT_TTL_MINUTES: 60
      CORE_DEFAULT_USERS_LIMIT: 10
      CORE_ALLOWED_ORIGINS: http://localhost:3000
      CORE_AUTO_MIGRATE: "true"
      EVOLUTION_BASE_URL: ""
      EVOLUTION_API_KEY: ""
      EVOLUTION_SEND_PATH: /message/sendText/:instance
      EVOLUTION_SEND_MEDIA_PATH: /message/sendMedia/:instance
      EVOLUTION_SEND_AUDIO_PATH: /message/sendWhatsAppAudio/:instance
      EVOLUTION_DEFAULT_INSTANCE: demo-instance
      EVOLUTION_WEBHOOK_TOKEN: change-this-webhook-token
      WEBHOOK_RECEIVER_BASE_URL: http://atendimento-online-api:4000
      API_DB_SEED_ON_BOOT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose -f docker-compose.dev.yml up -d --build postgres redis plataforma-api atendimento-online-api

      - name: Wait for stack health
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:4100/health > /dev/null && \
               curl -fsS http://localhost:4000/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.dev.yml ps
          docker compose -f docker-compose.dev.yml logs --tail=200 plataforma-api atendimento-online-api postgres redis
          exit 1

      - name: Run tenant isolation audit
        run: docker compose -f docker-compose.dev.yml exec -T atendimento-online-api npm run test:tenant:isolation

      - name: Show stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --tail=200 plataforma-api atendimento-online-api postgres redis

      - name: Shutdown stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down --remove-orphans -v

  media-integration-audit:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: omnichannel
      POSTGRES_USER: omnichannel
      POSTGRES_PASSWORD: omnichannel
      DATABASE_URL: postgresql://omnichannel:omnichannel@postgres:5432/omnichannel?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-this-secret
      CORE_API_BASE_URL: http://plataforma-api:4100
      CORE_API_EMAIL: root@core.local
      CORE_API_PASSWORD: 123456
      CORE_REQUEST_TIMEOUT_MS: 15000
      CORE_ATENDIMENTO_MODULE_CODE: atendimento
      CORE_DATABASE_URL: postgresql://omnichannel:omnichannel@postgres:5432/omnichannel
      CORE_DB_SCHEMA: platform_core
      CORE_HTTP_ADDR: :4100
      CORE_JWT_SECRET: change-this-core-secret
      CORE_JWT_ISSUER: plataforma-api
      CORE_JWT_TTL_MINUTES: 60
      CORE_DEFAULT_USERS_LIMIT: 10
      CORE_ALLOWED_ORIGINS: http://localhost:3000
      CORE_AUTO_MIGRATE: "true"
      EVOLUTION_BASE_URL: ""
      EVOLUTION_API_KEY: ""
      EVOLUTION_SEND_PATH: /message/sendText/:instance
      EVOLUTION_SEND_MEDIA_PATH: /message/sendMedia/:instance
      EVOLUTION_SEND_AUDIO_PATH: /message/sendWhatsAppAudio/:instance
      EVOLUTION_DEFAULT_INSTANCE: demo-instance
      EVOLUTION_WEBHOOK_TOKEN: change-this-webhook-token
      GATE_WEBHOOK_TOKEN: change-this-webhook-token
      JOURNEY_WEBHOOK_TOKEN: change-this-webhook-token
      WEBHOOK_RECEIVER_BASE_URL: http://atendimento-online-api:4000
      SANDBOX_ENABLED: "false"
      API_DB_SEED_ON_BOOT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose -f docker-compose.dev.yml up -d --build postgres redis plataforma-api atendimento-online-api atendimento-online-worker

      - name: Wait for stack health
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:4100/health > /dev/null && \
               curl -fsS http://localhost:4000/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.dev.yml ps
          docker compose -f docker-compose.dev.yml logs --tail=200 plataforma-api atendimento-online-api atendimento-online-worker postgres redis
          exit 1

      - name: Run media integration audit
        run: docker compose -f docker-compose.dev.yml exec -T atendimento-online-api npm run test:media:integration

      - name: Run MVP gate audit
        run: docker compose -f docker-compose.dev.yml exec -T atendimento-online-api npm run test:gate:mvp

      - name: Run journey E2E audit
        run: docker compose -f docker-compose.dev.yml exec -T atendimento-online-api npm run test:journey:e2e

      - name: Show stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --tail=200 plataforma-api atendimento-online-api atendimento-online-worker postgres redis

      - name: Shutdown stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down --remove-orphans -v
