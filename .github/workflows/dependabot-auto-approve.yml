name: dependabot-auto-approve

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  approve-github-actions-pr:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main' &&
      !github.event.pull_request.draft &&
      (
        startsWith(github.event.pull_request.head.ref, 'dependabot/github_actions/') ||
        startsWith(github.event.pull_request.head.ref, 'dependabot/github-actions/')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Aprovar PR elegivel do Dependabot
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr review "$PR_NUMBER" --approve --body "Aprovacao automatica para atualizacao de GitHub Actions. O merge sera executado automaticamente apos o CI verde."