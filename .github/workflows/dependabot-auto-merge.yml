name: dependabot-auto-merge

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  merge-github-actions-pr:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolver PR associada ao CI
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          pr_number="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}" --jq '.pull_requests[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_payload="$(gh pr view "$pr_number" --json number,state,isDraft,author,headRefName,baseRefName,mergeStateStatus --jq '{number, state, isDraft, author: .author.login, headRefName, baseRefName, mergeStateStatus}')"
          author="$(printf '%s' "$pr_payload" | jq -r '.author')"
          state="$(printf '%s' "$pr_payload" | jq -r '.state')"
          is_draft="$(printf '%s' "$pr_payload" | jq -r '.isDraft')"
          head_ref="$(printf '%s' "$pr_payload" | jq -r '.headRefName')"
          base_ref="$(printf '%s' "$pr_payload" | jq -r '.baseRefName')"

          if [[ "$author" != "dependabot[bot]" || "$state" != "OPEN" || "$is_draft" != "false" || "$base_ref" != "main" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "$head_ref" =~ ^dependabot/(github_actions|github-actions)/ ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Mesclar PR do Dependabot
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --squash --delete-branch