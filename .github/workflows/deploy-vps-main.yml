name: deploy-vps-main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vps-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          : "${VPS_HOST:?Missing VPS_HOST secret}"
          : "${VPS_USER:?Missing VPS_USER secret}"
          : "${VPS_SSH_KEY:?Missing VPS_SSH_KEY secret}"
          : "${VPS_KNOWN_HOSTS:?Missing VPS_KNOWN_HOSTS secret}"

          if [ -z "${VPS_PORT:-}" ]; then
            VPS_PORT=22
          fi

          install -m 700 -d ~/.ssh

          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_vps_deploy
          chmod 600 ~/.ssh/id_vps_deploy

          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          printf '%s\n' \
            "Host omnichannel-vps" \
            "  HostName ${VPS_HOST}" \
            "  User ${VPS_USER}" \
            "  Port ${VPS_PORT}" \
            "  IdentityFile ~/.ssh/id_vps_deploy" \
            "  UserKnownHostsFile ~/.ssh/known_hosts" \
            "  StrictHostKeyChecking yes" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy main on VPS
        env:
          VPS_REMOTE_PATH: ${{ secrets.VPS_REMOTE_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${VPS_REMOTE_PATH:-}" ]; then
            VPS_REMOTE_PATH=/opt/omnichannel
          fi

          ssh omnichannel-vps "set -eu && \
            cd '${VPS_REMOTE_PATH}' && \
            git fetch --prune origin && \
            git checkout main && \
            git reset --hard origin/main && \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile channels --env-file .env.prod build \
              plataforma-api \
              atendimento-online-api \
              atendimento-online-worker \
              atendimento-online-retencao-worker \
              painel-web && \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile channels --env-file .env.prod up -d --force-recreate \
              plataforma-api \
              atendimento-online-api \
              atendimento-online-worker \
              atendimento-online-retencao-worker \
              painel-web \
              caddy && \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile channels --env-file .env.prod ps"